version: 2
updates:
  # Enable version updates for pip dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "momops"
    labels:
      - "dependencies"
      - "security"
    # Auto-merge minor and patch updates
    auto-merge:
      auto: true
      # Only merge if all CI checks pass
      allow-auto-merge: true
    # Group dependency updates
    groups:
      security:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
      production:
        patterns:
          - "anthropic"
          - "boto3"
          - "aioboto3"
          - "pydantic*"
          - "typer"
        update-types:
          - "minor"
          - "major"
    ignore:
      # Ignore major versions of certain critical packages for now
      - dependency-name: "boto3"
        update-types:
          - "major"
      - dependency-name: "anthropic"
        update-types:
          - "major"
  
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    labels:
      - "ci/cd"
