name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run security scans weekly
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  # Scan for secrets in code
  secrets:
    name: Detect Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --json --fail

  # SAST - Static Application Security Testing
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ['python']
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
      
      - uses: github/codeql-action/autobuild@v2
      
      - uses: github/codeql-action/analyze@v2

  # Check for known vulnerabilities in dependencies
  dependency-check:
    name: Dependency Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: uv sync --extra dev
      
      - name: Run safety check
        run: |
          uv pip install safety
          uv run safety check --json || true
      
      - name: Check for vulnerable packages
        run: |
          uv pip install pip-audit
          uv run pip-audit

  # Python code quality and security
  bandit:
    name: Bandit Security Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install bandit
        run: uv pip install bandit[toml]
      
      - name: Run Bandit
        run: uv run bandit -r momops -f json -o bandit-report.json || true
      
      - name: Upload Bandit report
        uses: actions/upload-artifact@v3
        with:
          name: bandit-report
          path: bandit-report.json

  # Lint and type check
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      
      - name: Install dependencies
        run: uv sync --extra dev
      
      - name: Run Ruff check
        run: uv run ruff check .
      
      - name: Run mypy
        run: uv run mypy momops
      
      - name: Run pytest with coverage
        run: uv run pytest --cov=momops --cov-report=json
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
